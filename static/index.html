<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Evo Chatterbox</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="shell">
    <section class="panel hero">
      <h1>Evo Chatterbox</h1>
      <div class="hero-links">
        <a class="ghost-link" href="/docs" target="_blank" rel="noreferrer">API FastAPI</a>
        <a class="ghost-link" href="/static/doc.html" target="_blank" rel="noreferrer">Documentation</a>
      </div>
    </section>

    <section class="panel">
      <form id="tts-form" class="form">
        <div class="grid top-grid">
          <label>
            <span>Language</span>
            <select id="language" name="language_id"></select>
            <small id="language-help" class="hint">Loading languages...</small>
          </label>

          <label>
            <span>Emotion</span>
            <select id="emotion" name="emotion_preset"></select>
            <small id="emotion-help" class="hint">Intonation preset based on native model controls.</small>
          </label>

          <label>
            <span>Quality</span>
            <select id="quality-mode" name="quality_mode">
              <option value="ultra">High stability</option>
              <option value="max" selected>Balanced stability</option>
              <option value="fast">Direct processing</option>
            </select>
            <small id="quality-help" class="hint">Balanced stability splits text into smaller chunks for better stability and naturalness.</small>
          </label>

          <label>
            <span>Reference audio</span>
            <input type="file" name="audio_prompt" accept=".wav,.mp3,.flac,.m4a,.ogg">
            <small id="audio-prompt-help" class="hint">Optional voice reference. Up to 15 MB.</small>
          </label>
        </div>

        <section class="emotion-panel" aria-label="Emotion presets">
          <div class="emotion-panel-header">
            <strong>Emotion shortcuts</strong>
            <button id="reset-emotion" class="ghost-button" type="button">Reset emotion</button>
          </div>
          <div id="emotion-chips" class="emotion-chips"></div>
        </section>

        <label>
          <div class="label-row">
            <span>Text</span>
            <strong id="char-count">0 characters</strong>
          </div>
          <textarea id="text" name="text" rows="8" placeholder="Type the text to synthesize..." required></textarea>
        </label>

        <div class="metrics">
          <div class="metric">
            <span>Elapsed time</span>
            <strong id="elapsed">00:00</strong>
          </div>
          <div class="metric">
            <span>Last conversion</span>
            <strong id="converted-count">0 characters</strong>
          </div>
          <div class="metric">
            <span>Backend</span>
            <strong id="backend-used">Waiting</strong>
          </div>
          <div class="metric">
            <span>Device</span>
            <strong id="device-used">Waiting</strong>
          </div>
        </div>

        <div class="grid sliders">
          <label>
            <div class="label-row">
              <span>Exaggeration</span>
              <strong id="exaggeration-value">0.50</strong>
            </div>
            <input id="exaggeration" type="range" name="exaggeration" min="0" max="1" step="0.05" value="0.5">
          </label>

          <label>
            <div class="label-row">
              <span>CFG Weight</span>
              <strong id="cfg-value">0.50</strong>
            </div>
            <input id="cfg_weight" type="range" name="cfg_weight" min="0" max="1" step="0.05" value="0.5">
          </label>

          <label>
            <div class="label-row">
              <span>Temperature</span>
              <strong id="temperature-value">0.80</strong>
            </div>
            <input id="temperature" type="range" name="temperature" min="0.1" max="2" step="0.1" value="0.8">
          </label>
        </div>

        <button id="submit" type="submit">Generate audio</button>
      </form>
    </section>

    <section class="panel output">
      <div class="status-row">
        <strong>Status</strong>
        <span id="status">Waiting for input.</span>
      </div>

      <audio id="player" controls></audio>
      <a id="download" class="download hidden" download="chatterbox.wav">Download file</a>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
