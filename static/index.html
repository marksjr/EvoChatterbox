<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Evo Chatterbox</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="shell">
    <section class="panel hero">
      <h1>Evo Chatterbox</h1>
    </section>

    <section class="panel">
      <form id="tts-form" class="form">
        <div class="grid top-grid">
          <label>
            <span>Idioma</span>
            <select id="language" name="language_id"></select>
            <small id="language-help" class="hint">Carregando idiomas...</small>
          </label>

          <label>
            <span>Emocao</span>
            <select id="emotion" name="emotion_preset"></select>
            <small id="emotion-help" class="hint">Preset de entonacao baseado nos controles nativos do modelo.</small>
          </label>

          <label>
            <span>Estabilidade</span>
            <select id="quality-mode" name="quality_mode">
              <option value="ultra">Estabilidade alta</option>
              <option value="max" selected>Estabilidade equilibrada</option>
              <option value="fast">Processamento direto</option>
            </select>
            <small id="quality-help" class="hint">Estabilidade equilibrada divide o texto em trechos menores para melhorar estabilidade e naturalidade.</small>
          </label>

          <label>
            <span>Audio de referencia</span>
            <input type="file" name="audio_prompt" accept=".wav,.mp3,.flac,.m4a,.ogg">
            <small id="audio-prompt-help" class="hint">Opcional para aproximar o timbre. Ate 15 MB.</small>
          </label>
        </div>

        <section class="emotion-panel" aria-label="Presets de emocao">
          <div class="emotion-panel-header">
            <strong>Atalhos de emocao</strong>
            <button id="reset-emotion" class="ghost-button" type="button">Resetar emocao</button>
          </div>
          <div id="emotion-chips" class="emotion-chips"></div>
        </section>

        <label>
          <div class="label-row">
            <span>Texto</span>
            <strong id="char-count">0 caracteres</strong>
          </div>
          <textarea id="text" name="text" rows="8" placeholder="Digite o texto para sintetizar..." required></textarea>
        </label>

        <div class="metrics">
          <div class="metric">
            <span>Tempo atual</span>
            <strong id="elapsed">00:00</strong>
          </div>
          <div class="metric">
            <span>Ultima conversao</span>
            <strong id="converted-count">0 caracteres</strong>
          </div>
          <div class="metric">
            <span>Backend</span>
            <strong id="backend-used">Aguardando</strong>
          </div>
          <div class="metric">
            <span>Dispositivo</span>
            <strong id="device-used">Aguardando</strong>
          </div>
        </div>

        <div class="grid sliders">
          <label>
            <div class="label-row">
              <span>Exaggeration</span>
              <strong id="exaggeration-value">0.50</strong>
            </div>
            <input id="exaggeration" type="range" name="exaggeration" min="0" max="1" step="0.05" value="0.5">
          </label>

          <label>
            <div class="label-row">
              <span>CFG Weight</span>
              <strong id="cfg-value">0.50</strong>
            </div>
            <input id="cfg_weight" type="range" name="cfg_weight" min="0" max="1" step="0.05" value="0.5">
          </label>

          <label>
            <div class="label-row">
              <span>Temperature</span>
              <strong id="temperature-value">0.80</strong>
            </div>
            <input id="temperature" type="range" name="temperature" min="0.1" max="2" step="0.1" value="0.8">
          </label>
        </div>

        <button id="submit" type="submit">Gerar audio</button>
      </form>
    </section>

    <section class="panel output">
      <div class="status-row">
        <strong>Status</strong>
        <span id="status">Aguardando envio.</span>
      </div>

      <audio id="player" controls></audio>
      <a id="download" class="download hidden" download="chatterbox.wav">Baixar arquivo</a>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
